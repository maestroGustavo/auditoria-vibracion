<!DOCTYPE html>
<html>
<head>
    <title>Atacante</title>
    <script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; background:#2c3e50; color:white;">
    <h1>CONSOLA DE MANDO</h1>
    <button id="attack" style="padding:30px; font-size:2em; background:red; color:white; border:none;">
        EJECUTAR VIBRACIÓN
    </button>

    <script>
        try {
            const pieSocket = new PieSocket.default({
                clusterId: 'free.blr2',
                apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
            });

            const channel = pieSocket.subscribe('clase-vibracion-2026');

            document.getElementById('attack').onclick = () => {
                channel.publish({ action: 'vibrate' });
                alert("Ataque enviado al servidor");
            };
        } catch (err) {
            alert("Error en atacante: " + err.message);
        }
    </script>
</body>
</html>
