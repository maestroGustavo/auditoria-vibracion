<!DOCTYPE html>
<html>
<head>
<title>Panel de Control Atacante</title>
<script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; background:#2c3e50; color:white;">
<h1>CONSOLA DE MANDO</h1>
<button id="attack" style="padding:30px; font-size:2em; background:red;
color:white; border:none; border-radius:10px; cursor:pointer;">
EJECUTAR VIBRACIÓN
</button>
<script>
const pie = new PieSocket.default({
clusterId: 'free.blr2',
apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
});
const ch = pie.subscribe('vibration-room');
document.getElementById('attack').onclick = () => {
ch.publish('vibration-room', { action: 'vibrate' });
console.log("Ataque enviado");
};
</script>
</body>
</html>
