<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Consola Atacante</title>
    <script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; background:#2c3e50; color:white; font-family:sans-serif;">
    <h1>PANEL DE CONTROL</h1>
    <p>Conexión: <span id="st">Conectando...</span></p>
    <button id="attack" style="padding:30px; font-size:1.5em; background:red; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">
        EJECUTAR ATAQUE REMOTO
    </button>

    <script>
        const st = document.getElementById('st');
        let globalChannel;

        try {
            const PieSocketClass = PieSocket.default ? PieSocket.default : PieSocket;
            const pieSocket = new PieSocketClass({
                clusterId: 'free.blr2',
                apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
            });

            pieSocket.subscribe('clase-vibracion-2026').then(channel => {
                globalChannel = channel;
                st.innerText = "SISTEMA LISTO";
                st.style.color = "#00ff00";
            });

            document.getElementById('attack').onclick = () => {
                if (globalChannel) {
                    // Enviamos una señal simple al evento 'vibrate-event'
                    globalChannel.publish('vibrate-event', { data: "ataque" });
                    alert("Ataque enviado a todos los nodos.");
                } else {
                    alert("Error: No hay conexión con el servidor.");
                }
            };
        } catch (err) {
            alert("Error crítico: " + err.message);
        }
    </script>
</body>
</html>
