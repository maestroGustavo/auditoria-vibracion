<!DOCTYPE html>
<html>
<head>
    <title>Receptor</title>
    <script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
    <h1>Estado: <span id="st" style="color:red">Buscando señal...</span></h1>
    <button id="btn" style="padding:20px; font-size:1.5em;">1. Pulsa </button>

    
       <script>
    const st = document.getElementById('st');
    try {
        const PieSocketClass = PieSocket.default ? PieSocket.default : PieSocket;

        const pieSocket = new PieSocketClass({
            clusterId: 'free.blr2',
            apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
        });

        const channel = pieSocket.subscribe('clase-vibracion-2026');

        channel.on('open', () => {
            st.innerText = "CONECTADO";
            st.style.color = "green";
        });

        // ... resto del código igual ...
    } catch (err) {
        alert("Error técnico: " + err.message);
    }
</script>
</body>
</html>
