<!DOCTYPE html>
<html>
<head>
<title>Nodo Receptor</title>
<script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
<h1>Estado: <span id="st" style="color:red">Desconectado</span></h1>
<button id="btn" style="padding:20px; font-size:1.5em; cursor:pointer;">1.
PRESIONA EL BOTON</button>
<script>
// REEMPLAZA CON TUS DATOS DE PIESOCKET
const pie = new PieSocket.default({
clusterId: 'free.blr2',
apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
});
const ch = pie.subscribe('vibration-room');
document.getElementById('btn').onclick = () => {
document.getElementById('st').innerText = "ESPERA";
document.getElementById('st').style.color = "green";
alert("Sistema armado. sientes eso?...");
};
ch.on('message', (msg) => {
const data = JSON.parse(msg.data);
if(data.action === 'vibrate' && navigator.vibrate) {
navigator.vibrate([500, 200, 500]);
}
});
</script>
</body>
</html>
