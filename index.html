<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nodo Receptor - Auditoría</title>
    <script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background-color:#f9f9f9;">
    <h1>Estado: <span id="st" style="color:red">Buscando señal...</span></h1>
    <button id="btn" style="padding:20px; font-size:1.2em; cursor:pointer; background:#007bff; color:white; border:none; border-radius:8px;">
        1. PULSA ESTE BOTON
    </button>
    <p id="debug" style="color:gray; margin-top:20px; font-weight:bold;"></p>

    <script>
        const st = document.getElementById('st');
        const debug = document.getElementById('debug');

        try {
            const PieSocketClass = PieSocket.default ? PieSocket.default : PieSocket;
            const pieSocket = new PieSocketClass({
                clusterId: 'free.blr2',
                apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
            });

            pieSocket.subscribe('clase-vibracion-2026').then(channel => {
                st.innerText = "ESPERA";
                st.style.color = "green";
                debug.innerText = "lograste sentir eso?.";

                // Escuchamos cualquier mensaje en el evento 'vibrate-event'
                channel.listen('vibrate-event', (msg) => {
                    console.log("Señal detectada");
                    if (navigator.vibrate) {
                        // Patrón de vibración: 800ms vibrar, 100ms pausa, 800ms vibrar
                        navigator.vibrate([800, 100, 1000]);
                        debug.innerText = "¡UUUUUUY QUE ES ESO?!";
                        debug.style.color = "red";
                        
                        // Limpiar mensaje después de 3 segundos
                        setTimeout(() => { 
                            debug.innerText = "Listo           .";
                            debug.style.color = "gray";
                        }, 3000);
                    }
                });
            });

            document.getElementById('btn').onclick = () => {
                if (navigator.vibrate) {
                    navigator.vibrate(100);
                    alert("Hardware detectado con éxito. Ahora cierra esta ventana de alerta.");
                } else {
                    alert("Este navegador no tiene acceso al motor de vibración.");
                }
            };
        } catch (err) {
            st.innerText = "ERROR DE CÓDIGO";
            debug.innerText = err.message;
        }
    </script>
</body>
</html>
