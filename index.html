<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nodo Receptor - Auditoría</title>
    <script src="https://unpkg.com/piesocket-js@4"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background-color:#f9f9f9;">
    <h1>Estado: <span id="st" style="color:red">Buscando señal...</span></h1>
    <button id="btn" style="padding:20px; font-size:1.2em; cursor:pointer; background:#007bff; color:white; border:none; border-radius:8px;">
        1. ACTIVAR RECEPTOR
    </button>
    <p id="debug" style="color:gray; margin-top:20px;"></p>

    <script>
        const st = document.getElementById('st');
        const debug = document.getElementById('debug');

        try {
            const PieSocketClass = PieSocket.default ? PieSocket.default : PieSocket;
            const pieSocket = new PieSocketClass({
                clusterId: 'free.blr2',
                apiKey: 'iKqhiMGj6f78LGjA620E1TUH3wznbapIrqHtoM1A'
            });

            // Suscripción al canal
            pieSocket.subscribe('clase-vibracion-2026').then(channel => {
                st.innerText = "CONECTADO";
                st.style.color = "green";
                debug.innerText = "Listo para recibir ataques.";

                // FORMA CORRECTA DE ESCUCHAR MENSAJES EN V4
                channel.listen('message', (msg) => {
                    console.log("Mensaje recibido:", msg);
                    let data = msg.data;
                    if (typeof data === 'string') data = JSON.parse(data);
                    
                    if (data.action === 'vibrate' && navigator.vibrate) {
                        navigator.vibrate([500, 200, 500]);
                        debug.innerText = "¡Vibrando!";
                    }
                });
            });

            document.getElementById('btn').onclick = () => {
                if (navigator.vibrate) {
                    navigator.vibrate(100);
                    alert("Hardware vinculado. Esperando señal...");
                } else {
                    alert("Tu navegador no soporta vibración.");
                }
            };
        } catch (err) {
            st.innerText = "ERROR";
            debug.innerText = err.message;
        }
    </script>
</body>
</html>
